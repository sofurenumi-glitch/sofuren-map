<style>
:root {
  --ink: #1a1008;
  --red: #c0392b;
  --gold: #b8860b;
  --cream: #faf6ef;
  --warm: #e8e0d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',Georgia,serif;
  background: var(--cream);
  color: var(--ink);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100%;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  padding: 14px 16px 10px;
  position: sticky; top:0; z-index:1000;
  box-shadow: 0 2px 10px rgba(0,0,0,.35);
}
.h-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.logo {
  width:34px; height:34px; background:var(--red);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:900; font-size:15px; flex-shrink:0;
}
.h-title { flex:1; }
.h-title h1 { color:#fff; font-size:14px; letter-spacing:.06em; }
.h-title p  { color:rgba(255,255,255,.45); font-size:9px; letter-spacing:.15em; margin-top:1px; }
.badge { background:var(--red); color:#fff; font-size:10px; padding:3px 8px; border-radius:20px; flex-shrink:0; }

.filters { display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.filters::-webkit-scrollbar { display:none; }
.f-btn {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.7); padding:4px 11px; border-radius:20px;
  font-size:11px; font-family:inherit; white-space:nowrap; cursor:pointer;
  transition:.15s; flex-shrink:0;
}
.f-btn.on { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; }

/* ── MAP ── */
#map {
  width:100%; height:320px;
  z-index:1;
}

/* Leaflet カスタムポップアップ */
.leaflet-popup-content-wrapper {
  background: var(--ink);
  color: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  font-family: 'Hiragino Mincho ProN','Yu Mincho',serif;
}
.leaflet-popup-tip { background: var(--ink); }
.leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height:1.6; }
.leaflet-popup-close-button { color: rgba(255,255,255,.6) !important; font-size:18px !important; }
.popup-name { font-weight:700; font-size:14px; margin-bottom:4px; }
.popup-area { font-size:10px; opacity:.6; margin-bottom:6px; }
.popup-detail-btn {
  display:block; margin-top:8px;
  background:var(--red); color:#fff;
  border:none; border-radius:6px;
  padding:6px 14px; font-size:11px;
  font-family:inherit; font-weight:700;
  cursor:pointer; width:100%; text-align:center;
}

/* ── LIST ── */
.list-wrap { padding: 0 0 72px; }
.list-head { padding:12px 16px 6px; display:flex; align-items:baseline; gap:8px; }
.list-label { font-size:11px; color:var(--gold); letter-spacing:.2em; }
.list-cnt   { font-size:10px; color:rgba(26,16,8,.4); }

.card {
  margin:0 12px 7px; background:#fff; border-radius:10px;
  box-shadow:0 1px 4px rgba(26,16,8,.1); border:1.5px solid transparent;
  cursor:pointer; transition:.15s;
  animation:fadeUp .25s ease both;
}
.card:active { transform:scale(.98); }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.card-inner { display:flex; align-items:center; padding:11px 13px; gap:10px; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:1px; }
.card-body { flex:1; min-width:0; }
.card-name { font-size:14px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-addr { font-size:11px; color:rgba(26,16,8,.45); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.area-tag  { font-size:10px; padding:2px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; font-weight:700; }

/* ── DRAWER ── */
.ov { position:fixed; inset:0; background:rgba(26,16,8,.45); z-index:2000; opacity:0; pointer-events:none; transition:opacity .25s; }
.ov.open { opacity:1; pointer-events:all; }
.drawer {
  position:fixed; bottom:0; left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%; max-width:480px;
  background:var(--cream); border-radius:18px 18px 0 0;
  z-index:2001; transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:80vh; overflow-y:auto;
  padding-bottom: env(safe-area-inset-bottom,16px);
}
.drawer.open { transform:translateX(-50%) translateY(0); }
.d-handle { width:34px; height:4px; background:rgba(26,16,8,.18); border-radius:2px; margin:11px auto 0; }
.d-head { padding:14px 18px 12px; border-bottom:1px solid var(--warm); }
.d-area-tag { font-size:10px; padding:2px 9px; border-radius:20px; font-weight:700; display:inline-block; margin-bottom:7px; }
.d-name { font-size:20px; font-weight:700; line-height:1.3; color:var(--ink); }
.d-body { padding:14px 18px; }
.info-row { display:flex; gap:10px; margin-bottom:13px; align-items:flex-start; }
.i-icon { width:30px; height:30px; background:var(--warm); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.i-cnt { flex:1; }
.i-label { font-size:10px; color:rgba(26,16,8,.4); letter-spacing:.08em; margin-bottom:2px; }
.i-val { font-size:13px; color:var(--ink); line-height:1.5; }
.i-val a { color:var(--red); text-decoration:none; font-weight:700; }
.d-actions { display:flex; gap:8px; padding:0 18px 18px; }
.d-btn { flex:1; padding:11px; border:none; border-radius:10px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; letter-spacing:.04em; }
.d-btn:active { opacity:.8; }
.d-btn.pri { background:var(--red); color:#fff; }
.d-btn.sec { background:var(--warm); color:var(--ink); }

/* ── FOOTER ── */
footer {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:var(--ink); color:rgba(255,255,255,.35);
  font-size:10px; text-align:center; padding:7px 16px; letter-spacing:.1em;
}

/* エリアカラー */
.c-oita     { background:#c0392b18; color:#c0392b; }
.c-fukuoka  { background:#2c7bb618; color:#2c7bb6; }
.c-kurume   { background:#27ae6018; color:#27ae60; }
.c-saga     { background:#8e44ad18; color:#8e44ad; }
.c-kumamoto { background:#e67e2218; color:#e67e22; }
.c-kinki    { background:#16a08518; color:#16a085; }
.c-kanto    { background:#2c3e5018; color:#2c3e50; }
</style>
</head>

  "佐賀":  [[32.9,129.6],[33.7,130.9]],
  "熊本":  [[32.6,130.4],[33.1,131.1]],
  "近畿":  [[34.7,135.2],[35.2,136.0]],
  "関東":  [[35.4,139.2],[36.1,140.1]]
};

// ── Leaflet 初期化 ──
var map = L.map('map', {
  center: [33.4, 130.7],
  zoom: 8,
  zoomControl: true,
  scrollWheelZoom: false  // スマホでのスクロール干渉を防止
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

var currentArea = "all";
var markerGroup = L.layerGroup().addTo(map);

// ── カスタムピンアイコン作成 ──
function makeIcon(color, isHome) {
  var size = isHome ? 14 : 10;
  var border = isHome ? '2.5px solid #b8860b' : '2px solid #fff';
  var shadow = '0 1px 4px rgba(0,0,0,0.5)';
  return L.divIcon({
    className: '',
    html: '<div style="width:' + size + 'px;height:' + size + 'px;background:' + color +
          ';border:' + border + ';border-radius:50%;box-shadow:' + shadow + ';"></div>',
    iconSize:   [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor:[0, -(size/2 + 4)]
  });
}

// ── マーカー描画 ──
function drawMarkers(stores) {
  markerGroup.clearLayers();
  stores.forEach(function(s) {
    var color = AC[s.area].pin;
    var marker = L.marker([s.lat, s.lng], { icon: makeIcon(color, false) });

    var popupHtml =
      '<div class="popup-area">' + s.area + '地区</div>' +
      '<div class="popup-name">想夫恋 ' + s.n + '</div>' +
      '<button class="popup-detail-btn" onclick="openDrawerById(' + s.id + ')">詳細を見る</button>';

    marker.bindPopup(popupHtml, { minWidth: 160, maxWidth: 220 });
    marker.addTo(markerGroup);
  });
}

// ── リスト描画 ──
function drawList(stores) {
  var el = document.getElementById('storeList');
  el.innerHTML = '';
  document.getElementById('listCnt').textContent = stores.length + '件表示中';
  document.getElementById('badge').textContent   = stores.length + '店舗';

  stores.forEach(function(s, i) {
    var c = AC[s.area];
    var d = document.createElement('div');
    d.className = 'card';
    d.style.animationDelay = (i * 0.025) + 's';
    d.innerHTML =
      '<div class="card-inner">' +
        '<div class="dot" style="background:' + c.pin + '"></div>' +
        '<div class="card-body">' +
          '<div class="card-name">想夫恋 ' + s.n + '</div>' +
          '<div class="card-addr">' + s.addr + '</div>' +
        '</div>' +
        '<div class="area-tag ' + c.cls + '">' + s.area + '</div>' +
      '</div>';
    d.addEventListener('click', function() {
      map.flyTo([s.lat, s.lng], 14, { duration: 0.8 });
      openDrawer(s);
    });
    el.appendChild(d);
  });
}

function getFiltered(area) {
  return area === 'all' ? STORES : STORES.filter(function(s){ return s.area === area; });
}

function render(area) {
  currentArea = area;
  var stores = getFiltered(area);
  drawMarkers(stores);
  drawList(stores);

  var b = BOUNDS[area] || BOUNDS.all;
  map.fitBounds(b, { padding: [20, 20], animate: true });
}

// ── フィルター ──
document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render(btn.dataset.area);
});

// ── ドロワー ──
window.openDrawerById = function(id) {
  var s = STORES.find(function(x){ return x.id === id; });
  if (s) openDrawer(s);
};

function openDrawer(s) {
  var c = AC[s.area];
  document.getElementById('dArea').textContent  = s.area + '地区';
  document.getElementById('dArea').className    = 'd-area-tag ' + c.cls;
  document.getElementById('dName').textContent  = '想夫恋 ' + s.n;
  document.getElementById('dHome') && (document.getElementById('dHome').textContent = '');
  document.getElementById('dAddr').textContent  = s.addr;
  document.getElementById('dTel').innerHTML     = '<a href="tel:' + s.tel.replace(/-/g,'') + '">' + s.tel + '</a>';
  document.getElementById('dHours').textContent = s.hrs;
  document.getElementById('dMapBtn').onclick    = function(){
    window.open('https://www.google.com/maps/search/?api=1&query=' +
      encodeURIComponent('想夫恋 ' + s.n + ' ' + s.addr), '_blank');
  };
  document.getElementById('drawer').classList.add('open');
  document.getElementById('ov').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('ov').classList.remove('open');
}
document.getElementById('dClose').addEventListener('click', closeDrawer);
document.getElementById('ov').addEventListener('click', closeDrawer);

// ── 初期表示 ──
render('all');

})();
</script>
</body>
</html>
